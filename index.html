<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="profile">
    <img src="https://eu.ui-avatars.com/api/?name=John+Doe&size=250" class="profile-avatar" alt="profile avatar">
    <h2 class="profile-name">Jessica Randall</h2>
    <h3 class="profile-address">London, United Kingdom</h3>
    <p class="profile-career">"Front-end developer and avid reader."</p>
    <ul class="profile-social-links">
      <li class="profile-social-link"><a href="#">GitHub</a></li>
      <li class="profile-social-link"><a href="#">Frontend Mentor</a></li>
      <li class="profile-social-link"><a href="#">LinkedIn</a></li>
      <li class="profile-social-link"><a href="#">Twitter</a></li>
      <li class="profile-social-link"><a href="#">Instagram</a></li>
    </ul>
  </div>
  
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/HakimDev-tech">HK08</a>.
  </div>
</body>
</html>
